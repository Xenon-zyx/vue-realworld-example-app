name: deploy on push production branch

on:
  push:
    branches:
      - master

jobs:
  deploy-app:
    runs-on: ubuntu-latest

    steps:
      - name: check out the code to build server
        uses: actions/checkout@v2

      - name: deploying latest change on ec2
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY_pro }}
          port: 22

          script: |
            cd /home/ubuntu/vue-realworld-example-app
            git pull origin master
            npm install
            npm run build
            pm2 restart all
